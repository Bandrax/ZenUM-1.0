<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1024px; height: 500px; overflow: hidden;
            background: linear-gradient(135deg, #0b1a2e 0%, #0d2847 30%, #0a3d6b 60%, #00b4d8 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            position: relative;
        }
        .content {
            display: flex; align-items: center; gap: 60px; z-index: 2;
        }
        .logo-container {
            width: 180px; height: 180px;
            background: rgba(255,255,255,0.12);
            border-radius: 40px; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15);
        }
        .logo-container img { width: 140px; height: auto; filter: brightness(0) invert(1); opacity: 0.95; }
        .text-side { color: white; }
        .app-name { font-size: 72px; font-weight: 300; letter-spacing: 8px; margin-bottom: 12px; }
        .tagline { font-size: 22px; font-weight: 300; color: rgba(255,255,255,0.75); letter-spacing: 2px; }
        .org-name { font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.45); margin-top: 20px; letter-spacing: 1px; }

        .circle1 { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: rgba(0,180,216,0.08); top: -80px; right: -50px; }
        .circle2 { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: rgba(0,180,216,0.06); bottom: -60px; left: -40px; }
        .circle3 { position: absolute; width: 150px; height: 150px; border-radius: 50%; background: rgba(0,119,182,0.1); top: 50px; left: 100px; }
    </style>
</head>
<body>
    <div class="circle1"></div>
    <div class="circle2"></div>
    <div class="circle3"></div>
    <div class="content">
        <div class="logo-container">
            <img src="../www/img/vrapcici-logo.png" alt="Logo">
        </div>
        <div class="text-side">
            <div class="app-name">ZenUM</div>
            <div class="tagline">Tvoj prostor za mentalni mir</div>
            <div class="org-name">Udruga Vrapčići — Slavonski Brod</div>
        </div>
    </div>
</body>
</html>
